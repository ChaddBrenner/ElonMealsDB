services:
  mysql:
    image: mysql:8.4.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-elon_meals}
      MYSQL_USER: ${MYSQL_SCRAPER_USER:-elon_scraper}
      MYSQL_PASSWORD: ${MYSQL_SCRAPER_PASSWORD:?MYSQL_SCRAPER_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_API_USER: ${MYSQL_API_USER:-elon_api}
      MYSQL_API_PASSWORD: ${MYSQL_API_PASSWORD:?MYSQL_API_PASSWORD is required}
      MYSQL_SCRAPER_USER: ${MYSQL_SCRAPER_USER:-elon_scraper}
      MYSQL_SCRAPER_PASSWORD: ${MYSQL_SCRAPER_PASSWORD:?MYSQL_SCRAPER_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-9000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-elon_meals}
      DB_USER: ${MYSQL_API_USER:-elon_api}
      DB_PASSWORD: ${MYSQL_API_PASSWORD:?MYSQL_API_PASSWORD is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-360}
      BODY_LIMIT: ${BODY_LIMIT:-8kb}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "9000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m,uid=10001,gid=10001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:8080"
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m,uid=10001,gid=10001
      - /var/cache/nginx:noexec,nosuid,size=32m,uid=10001,gid=10001
      - /var/run:noexec,nosuid,size=8m,uid=10001,gid=10001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  scraper:
    build:
      context: ./scraper
    profiles:
      - scraper
    command: ["python", "-m", "elon_scraper.cli", "import-db", "--days-ahead", "${SCRAPER_DAYS_AHEAD:-1}"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-elon_meals}
      DB_USER: ${MYSQL_SCRAPER_USER:-elon_scraper}
      DB_PASSWORD: ${MYSQL_SCRAPER_PASSWORD:?MYSQL_SCRAPER_PASSWORD is required}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m,uid=10001,gid=10001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  scraper-scheduler:
    build:
      context: ./scraper
    command:
      - python
      - -m
      - elon_scraper.cli
      - schedule-import
      - --times
      - ${SCRAPER_RUN_TIMES:-05:15,15:15}
      - --days-ahead
      - ${SCRAPER_DAYS_AHEAD:-1}
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-elon_meals}
      DB_USER: ${MYSQL_SCRAPER_USER:-elon_scraper}
      DB_PASSWORD: ${MYSQL_SCRAPER_PASSWORD:?MYSQL_SCRAPER_PASSWORD is required}
      SCRAPER_RUN_ON_START: ${SCRAPER_RUN_ON_START:-true}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m,uid=10001,gid=10001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  mysql-data:
